<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI视频算法调度平台</title>
    <link href="./assets/css/prototype.css" type="text/css" rel="stylesheet" />
    <style>
      .prototype-home {
        min-height: 100vh;
        padding: 48px 24px;
        background:
          radial-gradient(circle at top right, rgba(45, 131, 245, 0.18), transparent 28%),
          linear-gradient(180deg, #f5f8fc 0%, #eef3f9 100%);
      }

      .prototype-home__shell {
        max-width: 1100px;
        margin: 0 auto;
      }

      .prototype-home__hero {
        margin-bottom: 28px;
      }

      .prototype-home__eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .prototype-home__title {
        margin: 0;
        font-size: 40px;
        line-height: 1.1;
      }

      .prototype-home__summary {
        max-width: 720px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .prototype-home__actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .prototype-home__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 144px;
        height: 44px;
        padding: 0 18px;
        border-radius: 10px;
        font-weight: 700;
      }

      .prototype-home__button--primary {
        background: var(--accent);
        color: #fff;
      }

      .prototype-home__button--secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .prototype-home__grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .prototype-home__card {
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 36px rgba(39, 52, 70, 0.06);
      }

      .prototype-home__card h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .prototype-home__card p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .prototype-home__card a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="prototype-home">
      <div class="prototype-home__shell">
        <section class="prototype-home__hero">
          <p class="prototype-home__eyebrow">Prototype Project</p>
          <h1 class="prototype-home__title">AI视频算法调度平台</h1>
          <p class="prototype-home__summary">
            当前仓库已经切换到纯静态多页面原型结构。首页保留为项目入口页，业务页面统一收敛到
            <code>pages/</code> 目录，共享资源收敛到 <code>assets/</code>。
          </p>
          <div class="prototype-home__actions">
            <a class="prototype-home__button prototype-home__button--primary" href="./pages/dashboard.html">进入仪表盘</a>
            <a class="prototype-home__button prototype-home__button--secondary" href="./pages/stream-analysis.html">查看任务管理</a>
          </div>
        </section>

        <section class="prototype-home__grid" aria-label="页面导航">
          <article class="prototype-home__card">
            <h2>仪表盘</h2>
            <p>系统概览、告警统计和关键运营指标。</p>
            <a href="./pages/dashboard.html">打开页面</a>
          </article>
          <article class="prototype-home__card">
            <h2>接入管理</h2>
            <p>接入源管理、本地视频、云端录像与代理编辑链路。</p>
            <a href="./pages/access-source.html">打开接入源管理</a>
          </article>
          <article class="prototype-home__card">
            <h2>任务管理</h2>
            <p>视频流分析、离线分析与新建任务流程。</p>
            <a href="./pages/stream-analysis.html">打开视频流分析</a>
          </article>
          <article class="prototype-home__card">
            <h2>设备与通道</h2>
            <p>设备新增、设备编辑、通道列表与通道编辑。</p>
            <a href="./pages/gb-device-create.html">打开设备新增</a>
          </article>
        </section>
      </div>
    </main>
  </body>
</html>
